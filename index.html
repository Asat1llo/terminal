<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="An interactive terminal-style website. Type 'help' to get started." />
  <title>~ / terminal</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='15' fill='%23000'/%3E%3Ctext x='50' y='65' font-size='60' text-anchor='middle' fill='%2300ff66' font-family='monospace'%3E%3E_%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <main class="terminal" id="terminal" aria-label="Interactive terminal">
    <header class="terminal__bar">
      <div class="terminal__buttons" aria-hidden="true">
        <span class="dot dot--red"></span>
        <span class="dot dot--yellow"></span>
        <span class="dot dot--green"></span>
      </div>
      <div class="terminal__title">guest@web ~ — bash</div>
      <div class="terminal__spacer"></div>
    </header>

    <section class="terminal__screen" id="screen" role="log" aria-live="polite"></section>

    <form class="terminal__inputline" id="form" autocomplete="off">
      <span class="prompt" id="prompt">guest@web:~$</span>
      <input
        class="terminal__input"
        id="input"
        type="text"
        spellcheck="false"
        autocapitalize="none"
        autocorrect="off"
        aria-label="Terminal input"
        autofocus
      />
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
